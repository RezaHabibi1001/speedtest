<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="fav.jpg" />
    <title>Speed Test | Network Analysis</title>
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=cabinet-grotesk@400,500,700,800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.8rem);
        --text-sm: clamp(0.8rem, 0.75rem + 0.3vw, 0.9rem);
        --text-base: clamp(0.925rem, 0.875rem + 0.25vw, 1rem);
        --text-lg: clamp(1.05rem, 0.95rem + 0.5vw, 1.25rem);
        --text-xl: clamp(1.35rem, 1.1rem + 1.2vw, 2rem);
        --text-2xl: clamp(1.75rem, 1.3rem + 2vw, 2.75rem);
        --text-3xl: clamp(2.5rem, 1.8rem + 3.5vw, 4.5rem);

        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.25rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --space-10: 2.5rem;
        --space-12: 3rem;

        --color-bg: #090c12;
        --color-surface: #10141d;
        --color-surface-2: #161b26;
        --color-border: rgba(173, 188, 214, 0.18);
        --color-divider: rgba(173, 188, 214, 0.1);
        --color-text: #edf2f7;
        --color-text-muted: #9aa8c1;
        --color-text-faint: #657289;
        --color-primary: #56c6d8;
        --color-primary-hover: #7bd7e4;
        --color-primary-highlight: rgba(86, 198, 216, 0.14);
        --color-success: #68d391;
        --color-error: #fb7185;
        --radius-sm: 0.375rem;
        --radius-md: 0.75rem;
        --radius-lg: 1rem;
        --radius-xl: 1.5rem;
        --radius-full: 9999px;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
        --shadow-md: 0 18px 50px rgba(0, 0, 0, 0.32);
        --shadow-lg: 0 40px 120px rgba(0, 0, 0, 0.45);
        --font-body: "Satoshi", "Inter", sans-serif;
        --font-display: "Cabinet Grotesk", "Satoshi", sans-serif;
        --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body {
        min-height: 100dvh;
        background:
          radial-gradient(circle at 15% 20%, rgba(86, 198, 216, 0.18), transparent 28%),
          radial-gradient(circle at 85% 15%, rgba(99, 102, 241, 0.14), transparent 24%),
          radial-gradient(circle at 50% 80%, rgba(52, 211, 153, 0.08), transparent 25%),
          radial-gradient(circle at 20% 60%, rgba(86, 198, 216, 0.06), transparent 35%),
          var(--color-bg);
        background-attachment: fixed;
        color: var(--color-text);
        font-family: var(--font-body);
        font-size: var(--text-base);
        line-height: 1.6;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-4);
        overflow-y: auto;
        overflow-x: hidden;
      }

      button {
        font: inherit;
        color: inherit;
        cursor: pointer;
        border: 0;
        background: none;
      }

      :focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 3px;
        border-radius: var(--radius-sm);
      }

      ::selection {
        background: rgba(86, 198, 216, 0.22);
      }

      .app {
        width: min(100%, 640px);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02));
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        position: relative;
        overflow: hidden;
      }

      .app::after {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(86, 198, 216, 0.4), transparent);
      }

      .app-inner {
        padding: var(--space-6) var(--space-6) var(--space-5);
        position: relative;
        z-index: 1;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .header-left {
        display: grid;
        gap: 0.15rem;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.7rem;
        border-radius: var(--radius-full);
        border: 1px solid var(--color-border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--color-text-muted);
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        width: fit-content;
      }

      .eyebrow::before {
        content: "";
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 50%;
        background: var(--color-primary);
        box-shadow: 0 0 0 5px rgba(86, 198, 216, 0.14);
      }

      h1 {
        font-family: var(--font-display);
        font-size: var(--text-xl);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-top: 0.3rem;
      }

      .header-icon {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: var(--radius-full);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .header-icon svg {
        width: 1.25rem;
        height: 1.25rem;
        color: var(--color-primary);
      }

      .speed-card {
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-5);
        margin-bottom: var(--space-4);
        position: relative;
        transition: border-color 0.3s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .speed-card:hover {
        border-color: var(--color-primary-highlight);
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
      }

      .speed-card::after {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(86, 198, 216, 0.3), transparent);
      }

      .speed-label-top {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        text-align: center;
        margin-top: var(--space-2);
      }

      .speed-value {
        font-family: var(--font-display);
        font-size: clamp(3rem, 10vw, 5.5rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
        font-variant-numeric: tabular-nums lining-nums;
        color: var(--color-text);
        transition: color 0.3s ease;
        text-align: center;
      }

      .speed-value.testing {
        color: var(--color-primary);
      }

      .speed-unit-inline {
        font-size: 0.3em;
        font-weight: 600;
        color: var(--color-text-muted);
        letter-spacing: -0.02em;
      }

      .status {
        text-align: center;
        font-size: var(--text-sm);
        color: var(--color-text-muted);
        font-weight: 500;
        min-height: 1.3rem;
        margin-top: var(--space-4);
        transition: color 0.3s ease;
      }

      .status.testing {
        color: var(--color-primary);
      }
      .status.complete {
        color: var(--color-success);
      }
      .status.failed {
        color: var(--color-error);
      }

      .actions {
        display: flex;
        gap: var(--space-3);
        justify-content: center;
        margin-bottom: var(--space-4);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        min-height: 2.75rem;
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius-full);
        font-size: var(--text-sm);
        font-weight: 600;
        transition: transform var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition);
        border: 1px solid transparent;
        min-width: 9rem;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: var(--color-primary);
        color: #090c12;
        font-weight: 700;
        box-shadow: 0 10px 30px rgba(86, 198, 216, 0.18);
        position: relative;
        overflow: hidden;
      }

      .btn-primary::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.15) 50%, transparent 60%);
        background-size: 200% 100%;
        transition: background-position 0.6s ease;
      }

      .btn-primary:hover::after {
        background-position: -200% 0;
      }

      .btn-primary:hover {
        background: var(--color-primary-hover);
        box-shadow: 0 14px 40px rgba(86, 198, 216, 0.25);
      }

      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-secondary {
        border-color: var(--color-border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--color-text-muted);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: var(--color-primary-highlight);
        color: var(--color-text);
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-3);
        margin-bottom: var(--space-3);
      }

      .stat-card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-3) var(--space-4);
        display: grid;
        gap: 0.15rem;
        transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }

      .stat-card::after {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(86, 198, 216, 0.25), transparent);
      }

      .stat-card:hover {
        transform: translateY(-3px);
        border-color: var(--color-primary-highlight);
        box-shadow: var(--shadow-sm);
      }

      .stat-label {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      .stat-value {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        font-weight: 700;
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums lining-nums;
      }

      .progress-section {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-3) var(--space-4);
        display: grid;
        gap: 0.5rem;
        transition: border-color 0.3s ease;
      }

      .progress-section:hover {
        border-color: var(--color-primary-highlight);
      }

      .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .progress-label {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      .progress-time {
        font-family: "ui-monospace", "SF Mono", monospace;
        font-size: 0.7rem;
        color: var(--color-text-faint);
        font-weight: 500;
      }

      .progress-track {
        height: 0.35rem;
        background: rgba(173, 188, 214, 0.08);
        border-radius: var(--radius-full);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: var(--radius-full);
        background: linear-gradient(90deg, var(--color-primary), #7bd7e4);
        transition: width 0.2s ease;
        will-change: width;
      }

      .network-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-5);
        padding-top: var(--space-3);
        flex-wrap: wrap;
      }

      .network-item {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: var(--text-xs);
        color: var(--color-text-faint);
        font-weight: 500;
      }

      .network-item svg {
        width: 0.75rem;
        height: 0.75rem;
        color: var(--color-primary);
        flex: 0 0 auto;
      }

      .ping-dot {
        display: inline-block;
        width: 0.35rem;
        height: 0.35rem;
        border-radius: 50%;
        background: var(--color-success);
        margin-inline-end: 0.25rem;
        vertical-align: middle;
        animation: ping-glow 2s ease-in-out infinite;
      }

      @keyframes ping-glow {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      .footnote {
        text-align: center;
        font-size: var(--text-xs);
        color: var(--color-text-faint);
        padding-top: var(--space-4);
        border-top: 1px solid var(--color-divider);
        margin-top: var(--space-4);
        line-height: 1.4;
      }

      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.7s ease, transform 0.7s ease;
      }

      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .reveal {
          opacity: 1;
          transform: none;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: var(--space-2);
        }
        .app-inner {
          padding: var(--space-4) var(--space-4) var(--space-4);
        }
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .actions {
          flex-direction: column;
        }
        .btn {
          width: 100%;
          min-width: 0;
        }
        .speed-card {
          padding: var(--space-5) var(--space-4);
        }
        h1 {
          font-size: var(--text-lg);
        }
      }

      @media (max-width: 400px) {
        body {
          padding: 0;
        }
        .app {
          border-radius: 0;
          border: none;
        }
        .app-inner {
          padding: var(--space-3);
        }
        .speed-value {
          font-size: 1.75rem;
        }
        .header-icon {
          width: 2.25rem;
          height: 2.25rem;
        }
      }

      @media (max-height: 700px) {
        .app-inner {
          padding: var(--space-3) var(--space-4);
        }
        .header {
          margin-bottom: var(--space-3);
        }
        .speed-card {
          padding: var(--space-3);
          margin-bottom: var(--space-3);
        }
        .speed-value {
          font-size: clamp(2rem, 8vw, 3rem);
        }
        .actions {
          margin-bottom: var(--space-3);
        }
      }
    </style>
  </head>
  <body>
    <a href="#main" class="sr-only">Skip to content</a>

    <main class="app" id="main">
      <div class="app-inner">
        <header class="header reveal">
          <div class="header-left">
            <p class="eyebrow">Network Analysis</p>
            <h1>Speed Test</h1>
          </div>
          <div class="header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <circle cx="12" cy="12" r="4" />
              <line x1="12" y1="2" x2="12" y2="6" />
              <line x1="12" y1="18" x2="12" y2="22" />
              <line x1="2" y1="12" x2="6" y2="12" />
              <line x1="18" y1="12" x2="22" y2="12" />
            </svg>
          </div>
        </header>

        <section aria-label="Speed measurement">
          <div class="speed-card reveal" id="speedCard">
            <div class="speed-value" id="speedValue">0.00 <span class="speed-unit-inline">Mbps</span></div>
            <div class="speed-label-top">Download Speed</div>
            <p class="status" id="statusText" aria-live="polite">Press start to measure</p>
          </div>

          <div class="actions reveal">
            <button class="btn btn-primary" id="startBtn" type="button">Start Test</button>
            <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
          </div>

          <div class="grid-2 reveal">
            <article class="stat-card">
              <span class="stat-label">Peak Speed</span>
              <strong class="stat-value" id="peakValue">0.00 Mbps</strong>
            </article>
            <article class="stat-card">
              <span class="stat-label">Average</span>
              <strong class="stat-value" id="avgValue">0.00 Mbps</strong>
            </article>
          </div>

          <div class="progress-section reveal">
            <div class="progress-header">
              <span class="progress-label">Progress</span>
              <span class="progress-time" id="durationNote">00:00 / 00:08</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
          </div>

          <div class="network-bar reveal">
            <span class="network-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="4" />
                <line x1="12" y1="2" x2="12" y2="6" />
                <line x1="12" y1="18" x2="12" y2="22" />
                <line x1="2" y1="12" x2="6" y2="12" />
                <line x1="18" y1="12" x2="22" y2="12" />
              </svg>
              <span>Cloudflare</span>
            </span>
            <span class="network-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
              </svg>
              <span id="pingDisplay"><span class="ping-dot"></span>Ping: -- ms</span>
            </span>
          </div>

          <p class="footnote reveal">
            Results reflect your real network conditions. Optimized for production use.
          </p>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const els = {
          speedCard: document.getElementById("speedCard"),
          speedValue: document.getElementById("speedValue"),
          statusText: document.getElementById("statusText"),
          peakValue: document.getElementById("peakValue"),
          avgValue: document.getElementById("avgValue"),
          progressFill: document.getElementById("progressFill"),
          durationNote: document.getElementById("durationNote"),
          startBtn: document.getElementById("startBtn"),
          resetBtn: document.getElementById("resetBtn"),
          pingDisplay: document.getElementById("pingDisplay"),
        };

        const TEST_URL = "https://speed.cloudflare.com/__down?bytes=25000000";
        const TEST_DURATION_MS = 8000;
        const UPDATE_INTERVAL_MS = 250;
        const MAX_PROGRESS_SPEED = 100;
        let testState = null;

        const fmt = (v) => `${v.toFixed(2)} Mbps`;
        const fmtTime = (ms) => {
          const t = Math.round(ms / 1000);
          return `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`;
        };

        const resetUI = () => {
          els.speedValue.textContent = "0.00";
          els.speedValue.className = "speed-value";
          els.statusText.textContent = "Press start to measure";
          els.statusText.className = "status";
          els.peakValue.textContent = fmt(0);
          els.avgValue.textContent = fmt(0);
          els.progressFill.style.width = "0%";
          els.durationNote.textContent = "00:00 / 00:08";
          els.speedCard.classList.remove("testing");
          els.pingDisplay.innerHTML = '<span class="ping-dot"></span>Ping: -- ms';
        };

        const stop = () => {
          if (!testState) return;
          testState.controllers.forEach((c) => c.abort());
          clearInterval(testState.renderTimer);
          clearTimeout(testState.finishTimer);
          testState = null;
          els.startBtn.disabled = false;
          els.startBtn.textContent = "Start Test";
        };

        const finish = () => {
          if (!testState) return;
          const sec = (performance.now() - testState.startedAt) / 1000;
          const samples = testState.samples.slice(2);
          const avg = samples.length ? samples.reduce((a, b) => a + b, 0) / samples.length : testState.currentMbps;
          const v = Number.isFinite(avg) ? avg : 0;
          els.speedValue.textContent = v.toFixed(2);
          els.speedValue.className = "speed-value";
          els.avgValue.textContent = fmt(v);
          els.peakValue.textContent = fmt(testState.peakMbps);
          els.progressFill.style.width = "100%";
          els.durationNote.textContent = `${fmtTime(TEST_DURATION_MS)} / ${fmtTime(TEST_DURATION_MS)}`;
          els.statusText.textContent = v > 0 ? "Test complete" : "Measurement failed";
          els.statusText.className = v > 0 ? "status complete" : "status failed";
          els.speedCard.classList.remove("testing");
          stop();
        };

        const worker = async (ctl) => {
          const r = await fetch(`${TEST_URL}&t=${Date.now()}-${Math.random().toString(36).slice(2)}`, {
            cache: "no-store",
            mode: "cors",
            signal: ctl.signal,
          });
          if (!r.ok || !r.body) return;
          const rd = r.body.getReader();
          while (true) {
            const { done, value } = await rd.read();
            if (done || !testState) break;
            testState.bytesLoaded += value.byteLength;
          }
        };

        const ping = async () => {
          const start = performance.now();
          try {
            const ctl = new AbortController();
            setTimeout(() => ctl.abort(), 3000);
            await fetch(
              `https://speed.cloudflare.com/__down?bytes=100&t=${Date.now()}-${Math.random().toString(36).slice(2)}`,
              { cache: "no-store", mode: "cors", signal: ctl.signal },
            );
            els.pingDisplay.innerHTML = `<span class="ping-dot"></span>Ping: ${Math.round(performance.now() - start)} ms`;
          } catch (_) {}
        };

        const begin = async () => {
          stop();
          resetUI();
          els.startBtn.disabled = true;
          els.startBtn.textContent = "Testing...";
          els.statusText.textContent = "Measuring download speed...";
          els.statusText.className = "status testing";
          await ping();
          const t0 = performance.now();
          testState = {
            startedAt: t0, bytesLoaded: 0, currentMbps: 0, peakMbps: 0, samples: [],
            controllers: [new AbortController(), new AbortController(), new AbortController()],
            renderTimer: null, finishTimer: null,
          };
          els.speedCard.classList.add("testing");
          testState.renderTimer = setInterval(() => {
            if (!testState) return;
            const sec = Math.max((performance.now() - testState.startedAt) / 1000, 0.2);
            const mbps = (testState.bytesLoaded * 8) / sec / 1000 / 1000;
            testState.currentMbps = mbps;
            testState.peakMbps = Math.max(testState.peakMbps, mbps);
            testState.samples.push(mbps);
            if (testState.samples.length > 40) testState.samples.shift();
            const pct = Math.min(((performance.now() - testState.startedAt) / TEST_DURATION_MS) * 100, 100);
            els.speedValue.textContent = mbps.toFixed(2);
            els.speedValue.className = "speed-value testing";
            els.peakValue.textContent = fmt(testState.peakMbps);
            els.progressFill.style.width = `${pct.toFixed(1)}%`;
            els.durationNote.textContent = `${fmtTime(performance.now() - testState.startedAt)} / ${fmtTime(TEST_DURATION_MS)}`;
          }, UPDATE_INTERVAL_MS);
          testState.finishTimer = setTimeout(finish, TEST_DURATION_MS);
          try { await Promise.allSettled(testState.controllers.map((c) => worker(c))); } catch (_) {}
        };

        els.startBtn.addEventListener("click", begin);
        els.resetBtn.addEventListener("click", () => { stop(); resetUI(); });
        resetUI();

        const ro = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add("visible"); });
        }, { threshold: 0.1 });
        document.querySelectorAll(".reveal").forEach((el) => ro.observe(el));
      })();
    </script>
  </body>
</html>
